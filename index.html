<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ticket to Paradise — Departures</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #000000;
    --panel: #0a0a0a;
    --flap: #121212;
    --flap-edge: #262208;
    --amber: #fce300;
    --label: #7c8798;
    --go: #3fae7d;
    --alert: #c1432c;
    --hairline: #242105;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; min-height:100vh;
    background: var(--bg);
    font-family:'Inter', sans-serif;
    color: var(--amber);
  }
  .board-wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }
  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom: 2px solid var(--hairline);
    padding-bottom: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap: 4px;
  }
  .brand h1{
    margin:0;
    font-family:'Share Tech Mono', monospace;
    font-weight: 700;
    font-size: clamp(34px, 6.5vw, 58px);
    letter-spacing: 1px;
    color: var(--amber);
    text-shadow: 0 0 18px rgba(252,227,0,0.35);
    text-transform: uppercase;
  }
  .status-cluster{
    display:flex;
    gap: 22px;
    align-items:center;
    font-family:'Share Tech Mono', monospace;
  }
  .status-item{
    text-align:right;
  }
  .status-item .k{
    font-size:10px;
    letter-spacing:2px;
    color: var(--label);
    text-transform:uppercase;
  }
  .status-item .v{
    font-size:18px;
    color: var(--amber);
  }
  .go-dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--go);
    box-shadow: 0 0 8px var(--go);
    display:inline-block;
    margin-right:6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  .board-panel{
    background: linear-gradient(180deg, #0f151d, #0a0e14);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.03);
    overflow:hidden;
  }

  .col-heads{
    display:grid;
    grid-template-columns: 64px 1fr 100px 150px;
    padding: 12px 18px;
    background: #0a0e14;
    border-bottom: 1px solid var(--hairline);
    font-family:'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--label);
    text-transform: uppercase;
  }
  .col-heads span:nth-child(3), .col-heads span:nth-child(4){ text-align:right; }

  .rows{
    max-height: 620px;
    overflow-y: auto;
  }
  .rows::-webkit-scrollbar{ width: 8px; }
  .rows::-webkit-scrollbar-thumb{ background: var(--hairline); border-radius: 4px; }

  .row{
    display:grid;
    grid-template-columns: 64px 1fr 100px 150px;
    align-items:center;
    padding: 10px 18px;
    border-bottom: 1px solid #10151d;
  }
  .row:nth-child(odd){ background: rgba(255,255,255,0.012); }
  .row.rank-1{ background: rgba(252,227,0,0.06); }

  .flap-cell{
    display:flex;
    gap: 3px;
  }
  .flap-cell.right{ justify-content:flex-end; }

  .flap-char{
    perspective: 300px;
    width: 15px;
    height: 24px;
  }
  .flap-char .face{
    width:100%; height:100%;
    background: var(--flap);
    border: 1px solid var(--flap-edge);
    border-radius: 2px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Share Tech Mono', monospace;
    font-size: 15px;
    color: var(--amber);
    transform-origin: center;
    animation: flapDrop 0.5s cubic-bezier(.2,.9,.3,1) both;
  }
  @keyframes flapDrop{
    0%{ transform: rotateX(90deg); opacity:0; }
    60%{ transform: rotateX(-8deg); opacity:1; }
    100%{ transform: rotateX(0deg); opacity:1; }
  }
  .flap-char.wide{ width: 11px; }

  .status-pill{
    font-family:'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 4px 8px;
    border-radius: 3px;
    text-align:center;
    text-transform:uppercase;
    animation: flapDrop 0.5s cubic-bezier(.2,.9,.3,1) both;
  }
  .status-boarding{ background: rgba(63,174,125,0.15); color: var(--go); border: 1px solid rgba(63,174,125,0.4); }
  .status-final{ background: rgba(244,185,62,0.15); color: var(--amber); border: 1px solid rgba(244,185,62,0.4); }
  .status-open{ background: rgba(124,135,152,0.1); color: var(--label); border: 1px solid var(--hairline); }
  .status-checked{ background: rgba(124,135,152,0.06); color: var(--label); border: 1px solid var(--hairline); }

  .footer-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 14px 18px;
    background: #0a0e14;
    border-top: 1px solid var(--hairline);
    font-family:'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--label);
    letter-spacing: 1px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .msg-state{
    padding: 60px 20px;
    text-align:center;
    font-family:'Share Tech Mono', monospace;
    color: var(--label);
    letter-spacing: 1px;
  }
  .msg-state .big{
    color: var(--alert);
    font-size: 15px;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }
  .msg-state a{ color: var(--amber); }

  @media (max-width: 560px){
    .col-heads, .row{ grid-template-columns: 44px 1fr 70px 0; }
    .col-heads span:nth-child(4), .row .status-cell{ display:none; }
    .flap-char{ width: 11px; height:20px; }
    .flap-char .face{ font-size: 12px; }
  }
</style>
</head>
<body>

<div class="board-wrap">
  <div class="top-bar">
    <div class="brand">
      <h1>Ticket to Paradise — Departures</h1>
    </div>
    <div class="status-cluster">
      <div class="status-item">
        <div class="k">Destination</div>
        <div class="v">Paradise</div>
      </div>
      <div class="status-item">
        <div class="k">Local Time</div>
        <div class="v" id="clock">--:--:--</div>
      </div>
      <div class="status-item">
        <div class="k"><span class="go-dot"></span>Feed</div>
        <div class="v" id="feed-state" style="font-size:14px;">LIVE</div>
      </div>
    </div>
  </div>

  <div class="board-panel">
    <div class="col-heads">
      <span>Rank</span>
      <span>Passenger</span>
      <span>Entries</span>
      <span>Status</span>
    </div>
    <div class="rows" id="rows">
      <div class="msg-state">Loading schedule…</div>
    </div>
    <div class="footer-bar">
      <span id="summary">— members · — entries in the draw</span>
      <span id="updated">Last updated —</span>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1Ajgxgi9U-crw04Fkdk40G7wWCbq2_wV-7I3RFCyTybQ";
const SHEET_NAME = "Ticket 2 Paradise";
const SHEET_GID = "990596303";
const CSV_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
                "/gviz/tq?tqx=out:csv&gid=" + SHEET_GID;
const REFRESH_MS = 30000;

let lastSignature = "";

function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else { field += c; }
    } else {
      if (c === '"'){ inQuotes = true; }
      else if (c === ','){ row.push(field); field = ""; }
      else if (c === '\n' || c === '\r'){
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field); rows.push(row); row = []; field = "";
      } else { field += c; }
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(cell => cell.trim() !== ""));
}

function statusFor(rank){
  return {label:"Gate Open", cls:"status-open"};
}

function makeFlapCell(text, opts){
  opts = opts || {};
  const wrap = document.createElement("div");
  wrap.className = "flap-cell" + (opts.right ? " right" : "");
  const chars = String(text).split("");
  chars.forEach((ch, idx) => {
    const cell = document.createElement("div");
    cell.className = "flap-char" + (opts.wide === false ? " wide" : "");
    const face = document.createElement("div");
    face.className = "face";
    face.textContent = ch === " " ? "\u00A0" : ch;
    face.style.animationDelay = (idx * 18 + (opts.rowDelay || 0)) + "ms";
    cell.appendChild(face);
    wrap.appendChild(cell);
  });
  return wrap;
}

function pad(str, len){
  str = String(str).toUpperCase();
  if (str.length >= len) return str.slice(0, len);
  return str + " ".repeat(len - str.length);
}
function padNum(n, len){
  return String(n).padStart(len, "0");
}

function render(entries){
  const rowsEl = document.getElementById("rows");
  rowsEl.innerHTML = "";

  if (!entries.length){
    rowsEl.innerHTML = '<div class="msg-state">No entries logged yet — check back once the first entries are added.</div>';
  }

  entries.forEach((e, i) => {
    const rank = i + 1;
    const rowDelay = i * 40;
    const rowEl = document.createElement("div");
    rowEl.className = "row" + (rank === 1 ? " rank-1" : "");

    rowEl.appendChild(makeFlapCell(padNum(rank, 3), {wide:false, rowDelay}));
    rowEl.appendChild(makeFlapCell(pad(e.name, 20), {rowDelay}));
    rowEl.appendChild(makeFlapCell(padNum(e.entries, 4), {right:true, wide:false, rowDelay}));

    const st = statusFor(rank);
    const statusCell = document.createElement("div");
    statusCell.className = "status-cell";
    const pill = document.createElement("span");
    pill.className = "status-pill " + st.cls;
    pill.textContent = st.label;
    pill.style.animationDelay = rowDelay + "ms";
    statusCell.appendChild(pill);
    rowEl.appendChild(statusCell);

    rowsEl.appendChild(rowEl);
  });

  const totalEntries = entries.reduce((sum, e) => sum + e.entries, 0);
  document.getElementById("summary").textContent =
    entries.length + " members · " + totalEntries + " entries in the draw";
  document.getElementById("updated").textContent =
    "Last updated " + new Date().toLocaleTimeString();
}

async function fetchData(){
  try{
    const res = await fetch(CSV_URL, {cache:"no-store"});
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);

    let dataRows = rows;
    const maybeHeader = rows[0];
    if (maybeHeader && isNaN(parseFloat(maybeHeader[1]))){
      dataRows = rows.slice(1);
    }

    const entries = dataRows
      .map(r => ({
        name: (r[0] || "").trim(),
        entries: parseInt((r[1] || "0").replace(/[^0-9.-]/g, ""), 10) || 0
      }))
      .filter(e => e.name.length > 0)
      .sort((a, b) => b.entries - a.entries);

    const signature = JSON.stringify(entries);
    document.getElementById("feed-state").textContent = "LIVE";
    document.getElementById("feed-state").style.color = "var(--go)";

    if (signature !== lastSignature){
      lastSignature = signature;
      render(entries);
    }
  } catch (err){
    document.getElementById("feed-state").textContent = "OFFLINE";
    document.getElementById("feed-state").style.color = "var(--alert)";
    const rowsEl = document.getElementById("rows");
    if (!lastSignature){
      rowsEl.innerHTML =
        '<div class="msg-state"><div class="big">SCHEDULE UNAVAILABLE</div>' +
        'Could not reach the sheet. Make sure "Trial System of God" is shared as ' +
        '"Anyone with the link can view", and that the tab is named exactly "' +
        SHEET_NAME + '".</div>';
    }
  }
}

function tickClock(){
  document.getElementById("clock").textContent = new Date().toLocaleTimeString([], {hour12:false});
}
tickClock();
setInterval(tickClock, 1000);

fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
